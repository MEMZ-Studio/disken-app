<!-- Generated by Trae Work -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>硬盘状态 - 磁盘精灵</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<script src="utils.js"></script>
<script>
(function() {
  const content = Disken.initPage('health', '🖥️ 硬盘状态');

  content.innerHTML = `<div id="healthGrid" class="health-grid"></div>`;

  const topbar = document.querySelector('.topbar');
  if (topbar) {
    Disken.addRefreshButton('content', load);
    const refreshBtn = content.querySelector('.refresh-btn');
    if (refreshBtn) {
      refreshBtn.style.marginLeft = 'auto';
      topbar.appendChild(refreshBtn);
    }
  }

  async function load() {
    const healthData = await Disken.api('/api/disk-health');
    const container = document.getElementById('healthGrid');
    if (!healthData || !healthData.disks || healthData.disks.length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="empty-text">无法获取硬盘信息</div></div>';
      return;
    }
    const healthDisks = healthData.disks || [];

    container.innerHTML = healthDisks.map(d => {
      const score = d.healthScore || 85;
      const ringColor = score > 80 ? '#10b981' : score > 60 ? '#f59e0b' : '#ef4444';
      const circumference = 2 * Math.PI * 34;
      const offset = circumference - (score / 100) * circumference;
      const hasTemp = d.temperature !== null && d.temperature !== undefined;
      const tempDisplay = hasTemp ? d.temperature + '°C' : '需要<br>管理员权限';
      const tempColor = hasTemp ? (d.temperature > 55 ? 'var(--danger)' : 'var(--ink)') : 'var(--muted)';
      const perfInfo = (d.perfReadBytesPerSec || d.perfWriteBytesPerSec) ? 
        `<span style="font-size:11px;color:var(--accent)">R: ${formatBytes(d.perfReadBytesPerSec)}/s</span> <span style="font-size:11px;color:var(--accent2)">W: ${formatBytes(d.perfWriteBytesPerSec)}/s</span>` : '';
      const hasReadWrite = d.readDisplay || d.writeDisplay;
      const totalDisplay = d.total || '—';
      const availDisplay = d.avail || '—';
      const letters = d.driveLetters ? `（${d.driveLetters}）` : '';
      return `<div class="health-card">
        <div class="hc-header">
          <span class="hc-name">${d.model || d.name}${letters}</span>
          <span class="hc-status ${score > 80 ? 'normal' : 'caution'}">
            <span style="width:6px;height:6px;border-radius:50%;background:${score > 80 ? '#10b981' : '#f59e0b'};display:inline-block"></span>
            ${d.status || (score > 80 ? '健康' : score > 60 ? '注意' : '警告')}
          </span>
        </div>
        <div class="health-score-ring">
          <svg viewBox="0 0 80 80">
            <circle cx="40" cy="40" r="34" fill="none" stroke="#1e2230" stroke-width="5"/>
            <circle cx="40" cy="40" r="34" fill="none" stroke="${ringColor}" stroke-width="5"
              stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"
              stroke-linecap="round" transform="rotate(-90, 40, 40)"/>
          </svg>
          <div class="score-text" style="color:${ringColor}">${score}</div>
        </div>
        <div class="hc-metrics">
          <div class="hc-metric">
            <div class="val" style="color:var(--accent)">${totalDisplay}</div>
            <div class="lbl">总容量</div>
          </div>
          <div class="hc-metric">
            <div class="val" style="color:var(--accent2)">${availDisplay}</div>
            <div class="lbl">可用空间</div>
          </div>
          <div class="hc-metric">
            <div class="val" style="color:${tempColor}">${tempDisplay}</div>
            <div class="lbl">温度</div>
          </div>
          <div class="hc-metric">
            <div class="val" style="color:var(--ink)">${d.type}</div>
            <div class="lbl">类型</div>
          </div>
          <div class="hc-metric">
            <div class="val" style="color:var(--muted);font-size:12px">${d.powerOnDisplay || '需要<br>管理员权限'}</div>
            <div class="lbl">通电时间</div>
          </div>
          <div class="hc-metric">
            <div class="val" style="color:${hasReadWrite ? 'var(--accent)' : 'var(--muted)'};font-size:12px">${d.readDisplay || '需要<br>管理员权限'}</div>
            <div class="lbl">总计读取</div>
          </div>
          <div class="hc-metric">
            <div class="val" style="color:${hasReadWrite ? 'var(--accent2)' : 'var(--muted)'};font-size:12px">${d.writeDisplay || '需要<br>管理员权限'}</div>
            <div class="lbl">总计写入</div>
          </div>
        </div>
        <div class="hc-footer">${d.smartAvailable ? 'S.M.A.R.T. 部分可用' : 'S.M.A.R.T. 未检测到'}
          ${perfInfo ? '<br>' + perfInfo : ''}</div>
      </div>`;
    }).join('');
  }

  function formatBytes(bytes) {
    if (bytes == null || bytes === 0) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
    const i = Math.floor(Math.log(Math.abs(bytes)) / Math.log(k));
    return (bytes / Math.pow(k, i)).toFixed(1) + ' ' + sizes[Math.min(i, sizes.length - 1)];
  }

  load();
  setInterval(load, 30000);
})();
</script>
</body>
</html>
