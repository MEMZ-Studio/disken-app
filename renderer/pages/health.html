<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>硬盘状态 - 磁盘精灵</title>
<link rel="stylesheet" href="styles.css">
<style>
.health-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
  padding: 0.5rem 0;
}
.admin-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.35rem 0.85rem;
  border-radius: 8px;
  font-size: 0.82rem;
}
.admin-badge.normal {
  background: rgba(16,185,129,0.1);
  color: #10b981;
  border: 1px solid rgba(16,185,129,0.3);
}
.admin-badge.warning {
  background: rgba(245,158,11,0.1);
  color: #f59e0b;
  border: 1px solid rgba(245,158,11,0.3);
}
.admin-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.45rem 1rem;
  border-radius: 8px;
  font-size: 0.82rem;
  border: 1px solid var(--accent);
  background: rgba(59,130,246,0.1);
  color: var(--accent);
  cursor: pointer;
  transition: all 0.15s;
}
.admin-btn:hover {
  background: rgba(59,130,246,0.2);
}
</style>
</head>
<body>
<script src="utils.js"></script>
<script>
(function() {
  const content = Disken.initPage('health', '🖥️ 硬盘状态');

  let isAdmin = false;

  content.innerHTML = `<div id="healthHeader" class="health-header"></div><div id="healthGrid" class="health-grid"></div>`;

  const topbar = document.querySelector('.topbar');
  if (topbar) {
    Disken.addRefreshButton('content', load);
    const refreshBtn = content.querySelector('.refresh-btn');
    if (refreshBtn) {
      refreshBtn.style.marginLeft = 'auto';
      topbar.appendChild(refreshBtn);
    }
  }

  async function checkAdmin() {
    try {
      const res = await Disken.api('/api/admin-status');
      isAdmin = res && res.isAdmin;
      updateAdminHeader();
    } catch(e) {
      isAdmin = false;
      updateAdminHeader();
    }
  }

  async function requestElevate() {
    try {
      await Disken.api('/api/admin-elevate');
    } catch(e) {}
  }

  function updateAdminHeader() {
    const header = document.getElementById('healthHeader');
    if (!header) return;

    let badge, action;
    if (isAdmin) {
      badge = `<span class="admin-badge normal">🛡️ 已获取管理员权限</span>`;
      action = '';
    } else {
      badge = `<span class="admin-badge warning">🔒 部分功能需要管理员权限</span>`;
      action = `<button class="admin-btn" onclick="requestElevate()">🔑 获取管理员权限</button>`;
    }
    header.innerHTML = `${badge} ${action}`;
  }

  async function load(forceRefresh) {
    const opts = forceRefresh ? { refresh: true } : undefined;
    await checkAdmin();
    const healthData = await Disken.api('/api/disk-health', opts);
    const container = document.getElementById('healthGrid');
    if (!healthData || !healthData.disks || healthData.disks.length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="empty-text">无法获取硬盘信息</div></div>';
      return;
    }
    const healthDisks = healthData.disks || [];

    container.innerHTML = healthDisks.map(d => {
      const score = d.healthScore || 85;
      const ringColor = score > 80 ? '#10b981' : score > 60 ? '#f59e0b' : '#ef4444';
      const circumference = 2 * Math.PI * 34;
      const offset = circumference - (score / 100) * circumference;
      const hasTemp = d.temperature !== null && d.temperature !== undefined;
      const isUsb = d.isUsb === true;
      
      let tempDisplay, tempColor;
      if (isUsb) {
        tempDisplay = '不支持';
        tempColor = 'var(--muted)';
      } else if (hasTemp) {
        tempDisplay = d.temperature + '°C';
        tempColor = d.temperature > 55 ? 'var(--danger)' : 'var(--ink)';
      } else {
        tempDisplay = isAdmin ? '不可用' : '需要<br>管理员权限';
        tempColor = 'var(--muted)';
      }
      
      const perfInfo = (d.perfReadBytesPerSec || d.perfWriteBytesPerSec) ? 
        `<span style="font-size:11px;color:var(--accent)">R: ${formatBytes(d.perfReadBytesPerSec)}/s</span> <span style="font-size:11px;color:var(--accent2)">W: ${formatBytes(d.perfWriteBytesPerSec)}/s</span>` : '';
      const hasReadWrite = d.readDisplay || d.writeDisplay;
      const totalDisplay = d.total || '—';
      const availDisplay = d.avail || '—';
      const letters = d.driveLetters ? `（${d.driveLetters}）` : '';
      
      function getMetricText(hasData, value, isUsb, isAdmin) {
        if (isUsb) return '不支持';
        if (hasData) return value;
        return isAdmin ? '不可用' : '需要<br>管理员权限';
      }
      
      const pohDisplay = getMetricText(!!d.powerOnDisplay, d.powerOnDisplay || '', isUsb, isAdmin);
      const readDisplayText = getMetricText(!!d.readDisplay, d.readDisplay || '', isUsb, isAdmin);
      const writeDisplayText = getMetricText(!!d.writeDisplay, d.writeDisplay || '', isUsb, isAdmin);
      const metricTextColor = 'var(--muted)';
      
      let smartFooter;
      if (isUsb) {
        smartFooter = '🔌 移动硬盘不支持S.M.A.R.T.';
      } else if (d.smartAvailable) {
        smartFooter = '✅ S.M.A.R.T. 数据已获取';
      } else if (isAdmin) {
        smartFooter = '⚠️ S.M.A.R.T. 数据不可用';
      } else {
        smartFooter = '🔒 获取管理员权限查看S.M.A.R.T.';
      }
      
      return `<div class="health-card">
        <div class="hc-header">
          <span class="hc-name">${d.model || d.name}${letters}${isUsb ? ' 🔌' : ''}</span>
          <span class="hc-status ${score > 80 ? 'normal' : 'caution'}">
            <span style="width:6px;height:6px;border-radius:50%;background:${score > 80 ? '#10b981' : '#f59e0b'};display:inline-block"></span>
            ${d.status || (score > 80 ? '健康' : score > 60 ? '注意' : '警告')}
          </span>
        </div>
        <div class="health-score-ring">
          <svg viewBox="0 0 80 80">
            <circle cx="40" cy="40" r="34" fill="none" stroke="#1e2230" stroke-width="5"/>
            <circle cx="40" cy="40" r="34" fill="none" stroke="${ringColor}" stroke-width="5"
              stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"
              stroke-linecap="round" transform="rotate(-90, 40, 40)"/>
          </svg>
          <div class="score-text" style="color:${ringColor}">${score}</div>
        </div>
        <div class="hc-metrics">
          <div class="hc-metric">
            <div class="val" style="color:var(--accent)">${totalDisplay}</div>
            <div class="lbl">总容量</div>
          </div>
          <div class="hc-metric">
            <div class="val" style="color:var(--accent2)">${availDisplay}</div>
            <div class="lbl">可用空间</div>
          </div>
          <div class="hc-metric">
            <div class="val" style="color:${tempColor}">${tempDisplay}</div>
            <div class="lbl">温度</div>
          </div>
          <div class="hc-metric">
            <div class="val" style="color:var(--ink)">${d.type}</div>
            <div class="lbl">类型</div>
          </div>
          <div class="hc-metric">
            <div class="val" style="color:${metricTextColor};font-size:12px">${pohDisplay}</div>
            <div class="lbl">通电时间</div>
          </div>
          <div class="hc-metric">
            <div class="val" style="color:${hasReadWrite ? 'var(--accent)' : metricTextColor};font-size:12px">${readDisplayText}</div>
            <div class="lbl">总计读取</div>
          </div>
          <div class="hc-metric">
            <div class="val" style="color:${hasReadWrite ? 'var(--accent2)' : metricTextColor};font-size:12px">${writeDisplayText}</div>
            <div class="lbl">总计写入</div>
          </div>
        </div>
        <div class="hc-footer">${smartFooter}
          ${perfInfo ? '<br>' + perfInfo : ''}</div>
      </div>`;
    }).join('');
  }

  function formatBytes(bytes) {
    if (bytes == null || bytes === 0) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
    const i = Math.floor(Math.log(Math.abs(bytes)) / Math.log(k));
    return (bytes / Math.pow(k, i)).toFixed(1) + ' ' + sizes[Math.min(i, sizes.length - 1)];
  }

  window.requestElevate = requestElevate;

  load();
  setInterval(() => load(false), 30000);
})();
</script>
</body>
</html>
