<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文件搜索 - 磁盘精灵</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<script src="utils.js"></script>
<script>
(function() {
  const content = Disken.initPage('search', '🔍 文件搜索');

  content.innerHTML = `
    <div class="search-top-bar">
      <div id="dirPickerContainer"></div>
      <div class="index-status" id="indexStatus">
        <span class="index-dot" id="indexDot"></span>
        <span class="index-label" id="indexLabel">正在检查索引...</span>
        <button class="index-btn" id="buildBtn" style="display:none">🔨 构建索引</button>
      </div>
    </div>
    <div class="search-hint">💡 已建立索引的磁盘可实现秒级响应（类似 Everything）· 双击打开文件 · 右键更多操作</div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="输入文件名搜索，例如 .jpg、report、config..." autocomplete="off">
      <button id="searchBtn">搜索</button>
    </div>
    <div class="search-filters" id="searchFilters">
      <div class="filter-row">
        <label>文件类型:</label>
        <select id="filterType">
          <option value="">全部类型</option>
          <option value="image">图片 (jpg, png, gif...)</option>
          <option value="video">视频 (mp4, avi, mkv...)</option>
          <option value="audio">音频 (mp3, wav, flac...)</option>
          <option value="document">文档 (pdf, doc, txt...)</option>
          <option value="archive">压缩包 (zip, rar, 7z...)</option>
          <option value="code">代码 (js, py, ts...)</option>
        </select>
      </div>
      <div class="filter-row">
        <label>最小大小:</label>
        <input type="number" id="filterMinSize" placeholder="0" min="0">
        <span class="size-unit">KB</span>
      </div>
      <div class="filter-row">
        <label>最大大小:</label>
        <input type="number" id="filterMaxSize" placeholder="不限" min="0">
        <span class="size-unit">KB</span>
      </div>
    </div>
    <div class="search-status" id="searchStatus">输入关键词开始搜索</div>
    <div class="build-progress" id="buildProgress" style="display:none">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">正在构建索引...</div>
      <button class="cancel-build-btn" id="cancelBuildBtn">取消</button>
    </div>
    <div class="results-list" id="searchResults"></div>
    <div class="context-menu" id="contextMenu" style="display:none">
      <div class="ctx-item" id="ctxOpen">📂 打开</div>
      <div class="ctx-item" id="ctxOpenFolder">📁 在资源管理器中显示</div>
      <div class="ctx-item" id="ctxCopyPath">📋 复制路径</div>
    </div>
  `;

  let selectedPath = '/';
  let searchTimer = null;
  let currentDrive = 'C:';
  let isIndexAvailable = false;
  let buildPollTimer = null;
  let currentResults = [];
  let selectedItem = null;
  let contextMenu = null;
  let searchClickHandler = null;
  let searchKeydownHandler = null;

  Disken.addDirPicker('dirPickerContainer', (path) => {
    selectedPath = path;
    const m = path.match(/^([A-Z]:)/i);
    if (m) currentDrive = m[1].toUpperCase();
    checkIndexStatus();
  });

  const input = document.getElementById('searchInput');
  const btn = document.getElementById('searchBtn');
  const results = document.getElementById('searchResults');
  const status = document.getElementById('searchStatus');
  const filterType = document.getElementById('filterType');
  const filterMinSize = document.getElementById('filterMinSize');
  const filterMaxSize = document.getElementById('filterMaxSize');
  const indexDot = document.getElementById('indexDot');
  const indexLabel = document.getElementById('indexLabel');
  const buildBtn = document.getElementById('buildBtn');
  const buildProgress = document.getElementById('buildProgress');
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');
  const cancelBuildBtn = document.getElementById('cancelBuildBtn');
  contextMenu = document.getElementById('contextMenu');

  function updateIndexUI(statusData) {
    if (!statusData || !statusData.hasIndex) {
      indexDot.className = 'index-dot index-off';
      indexLabel.textContent = '未建立索引（实时搜索较慢）';
      buildBtn.style.display = 'inline-block';
      isIndexAvailable = false;
    } else {
      indexDot.className = 'index-dot index-on';
      indexLabel.textContent = `已索引 ${statusData.fileCount.toLocaleString()} 个文件 · ${statusData.totalSizeFormatted}`;
      buildBtn.style.display = 'none';
      isIndexAvailable = true;
    }
  }

  async function checkIndexStatus() {
    try {
      const data = await Disken.api('/api/index/status?drive=' + encodeURIComponent(currentDrive));
      if (data && data.status) {
        updateIndexUI(data.status);
      }
    } catch(e) {
      updateIndexUI(null);
    }
  }

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function openFile(filePath) {
    fetch('/api/open-folder', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filePath: filePath })
    }).catch(function() {});
  }

  function showContextMenu(e, item) {
    e.preventDefault();
    e.stopPropagation();
    selectedItem = item;
    contextMenu.style.display = 'block';
    contextMenu.style.left = e.clientX + 'px';
    contextMenu.style.top = e.clientY + 'px';
  }

  function hideContextMenu() {
    contextMenu.style.display = 'none';
  }

  if (searchClickHandler) document.removeEventListener('click', searchClickHandler);
  searchClickHandler = function(e) {
    if (!contextMenu.contains(e.target)) hideContextMenu();
  };
  document.addEventListener('click', searchClickHandler);

  document.getElementById('ctxOpen').addEventListener('click', function() {
    if (selectedItem) openFile(selectedItem.path);
    hideContextMenu();
  });

  document.getElementById('ctxOpenFolder').addEventListener('click', function() {
    if (selectedItem) openFile(selectedItem.path);
    hideContextMenu();
  });

  document.getElementById('ctxCopyPath').addEventListener('click', function() {
    if (selectedItem) {
      const textarea = document.createElement('textarea');
      textarea.value = selectedItem.path;
      document.body.appendChild(textarea);
      textarea.select();
      try { document.execCommand('copy'); } catch(e) {}
      document.body.removeChild(textarea);
      status.textContent = '✅ 路径已复制到剪贴板';
    }
    hideContextMenu();
  });

  async function performSearch() {
    const q = input.value.trim();
    if (!q) {
      status.textContent = '请输入关键词开始搜索';
      results.innerHTML = '';
      currentResults = [];
      return;
    }
    btn.disabled = true;

    let url = '/api/search?q=' + encodeURIComponent(q) + '&path=' + encodeURIComponent(selectedPath);
    const typeVal = filterType.value;
    if (typeVal) url += '&type=' + encodeURIComponent(typeVal);
    const minSize = parseInt(filterMinSize.value);
    if (minSize > 0) url += '&minSize=' + (minSize * 1024);
    const maxSize = parseInt(filterMaxSize.value);
    if (maxSize > 0) url += '&maxSize=' + (maxSize * 1024);
    url += '&max=300';

    const data = await Disken.api(url);
    btn.disabled = false;
    if (!data) {
      status.textContent = '搜索请求失败，请重试';
      results.innerHTML = '';
      currentResults = [];
      return;
    }
    const items = data.results || [];
    currentResults = items;

    let filterDesc = '';
    if (typeVal) {
      const typeNames = { image: '图片', video: '视频', audio: '音频', document: '文档', archive: '压缩包', code: '代码' };
      filterDesc += ' | 类型: ' + (typeNames[typeVal] || typeVal);
    }
    if (minSize > 0) filterDesc += ' | 最小: ' + minSize + ' KB';
    if (maxSize > 0) filterDesc += ' | 最大: ' + maxSize + ' KB';

    const fromIdx = data.fromIndex ? '⚡ 索引搜索' : '🔍 实时搜索';
    const speed = data.elapsedMs !== undefined ? ` (${data.elapsedMs}ms)` : '';
    status.innerHTML = `在 ${selectedPath} 中找到 <strong>${items.length}</strong> 个匹配结果${filterDesc} · <span class="source-tag">${fromIdx}${speed}</span>`;

    if (items.length === 0) {
      results.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">未找到匹配 "${escapeHtml(q)}" 的文件</div></div>`;
      return;
    }

    const qLower = q.toLowerCase();
    results.innerHTML = items.map((f, idx) => {
      const icon = f.isDir ? '📁' : Disken.getTypeIcon('.' + f.name.split('.').pop());
      const nameHtml = escapeHtml(f.name).replace(new RegExp(qLower.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), m => `<span class="highlight">${m}</span>`);
      return `<div class="result-item" data-idx="${idx}">
        <div class="file-info">
          <span class="file-icon">${icon}</span>
          <div style="flex:1;min-width:0">
            <div class="file-name">${nameHtml}</div>
            <div class="file-path" title="${escapeHtml(f.path)}">${escapeHtml(f.path)}</div>
          </div>
        </div>
        <div class="file-meta">${f.sizeFormatted}${f.modified ? ' · ' + f.modified.slice(0,10) : ''}</div>
      </div>`;
    }).join('');

    results.querySelectorAll('.result-item').forEach(function(el) {
      const idx = parseInt(el.dataset.idx);
      const item = items[idx];
      el.addEventListener('dblclick', function() {
        openFile(item.path);
      });
      el.addEventListener('contextmenu', function(e) {
        showContextMenu(e, item);
      });
      el.addEventListener('click', function() {
        results.querySelectorAll('.result-item').forEach(function(r) { r.classList.remove('selected'); });
        el.classList.add('selected');
        selectedItem = item;
      });
    });
  }

  function debouncedSearch() {
    if (searchTimer) clearTimeout(searchTimer);
    searchTimer = setTimeout(performSearch, isIndexAvailable ? 80 : 400);
  }

  input.addEventListener('input', debouncedSearch);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') performSearch();
  });
  btn.addEventListener('click', performSearch);
  filterType.addEventListener('change', debouncedSearch);
  filterMinSize.addEventListener('change', debouncedSearch);
  filterMaxSize.addEventListener('change', debouncedSearch);

  buildBtn.addEventListener('click', async () => {
    if (!confirm(`确定要为 ${currentDrive} 盘构建文件索引吗？\n\n首次构建可能需要几分钟，构建完成后搜索将实现秒级响应。`)) return;
    buildProgress.style.display = 'flex';
    buildBtn.style.display = 'none';
    progressFill.style.width = '0%';
    progressText.textContent = '正在准备构建索引...';

    try {
      Disken.api('/api/index/build?drive=' + encodeURIComponent(currentDrive));

      buildPollTimer = setInterval(async () => {
        try {
          const data = await Disken.api('/api/index/status?drive=' + encodeURIComponent(currentDrive));
          if (data && data.status) {
            const s = data.status;
            if (s.isBuilding) {
              progressText.textContent = `已扫描 ${s.fileCount.toLocaleString()} 个文件 · ${s.totalSizeFormatted}`;
              progressFill.style.width = Math.min(95, (s.fileCount / 100000) * 100) + '%';
            } else if (s.hasIndex) {
              clearInterval(buildPollTimer);
              buildProgress.style.display = 'none';
              updateIndexUI(s);
              status.textContent = `✅ 索引构建完成！共 ${s.fileCount.toLocaleString()} 个文件，搜索速度已大幅提升。`;
              if (input.value.trim()) performSearch();
            }
          }
        } catch(e) {}
      }, 500);
    } catch(e) {
      buildProgress.style.display = 'none';
      alert('构建失败: ' + e.message);
    }
  });

  cancelBuildBtn.addEventListener('click', async () => {
    clearInterval(buildPollTimer);
    await Disken.api('/api/index/cancel?drive=' + encodeURIComponent(currentDrive));
    buildProgress.style.display = 'none';
    buildBtn.style.display = 'inline-block';
    status.textContent = '索引构建已取消';
    checkIndexStatus();
  });

  if (searchKeydownHandler) document.removeEventListener('keydown', searchKeydownHandler);
  searchKeydownHandler = function(e) {
    if (e.key === 'Escape') {
      hideContextMenu();
      results.querySelectorAll('.result-item').forEach(function(r) { r.classList.remove('selected'); });
      selectedItem = null;
    }
  };
  document.addEventListener('keydown', searchKeydownHandler);

  window.addEventListener('beforeunload', function() {
    if (searchTimer) clearTimeout(searchTimer);
    if (buildPollTimer) clearInterval(buildPollTimer);
    if (searchClickHandler) document.removeEventListener('click', searchClickHandler);
    if (searchKeydownHandler) document.removeEventListener('keydown', searchKeydownHandler);
  });

  input.focus();
  checkIndexStatus();
})();
</script>
</body>
</html>
