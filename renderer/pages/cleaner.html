<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>垃圾清理 - 磁盘精灵</title>
<link rel="stylesheet" href="styles.css">
<style>
.cleaner-page {
  display: flex;
  flex-direction: column;
  min-height: calc(100vh - 64px);
}

/* 初始状态 & 扫描中状态：居中布局 */
.cleaner-center {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  gap: 1.5rem;
}

.center-ring {
  width: 80px;
  height: 80px;
  border: 4px solid var(--rule);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: ringSpin 1s linear infinite;
}
@keyframes ringSpin { to { transform: rotate(360deg); } }

.center-ring-static {
  width: 80px;
  height: 80px;
  border: 4px solid var(--rule);
  border-top-color: var(--accent);
  border-radius: 50%;
}

.center-title {
  font-size: 1rem;
  color: var(--muted);
  font-weight: 400;
}

.start-btn {
  margin-top: 1rem;
  padding: 0.8rem 2.5rem;
  font-size: 1rem;
  font-weight: 600;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
}
.start-btn:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(59,130,246,0.35); }
.start-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

/* 进度条区域 */
.progress-area {
  width: 100%;
  max-width: 500px;
  display: flex;
  flex-direction: column;
  gap: 0.85rem;
}
.progress-bar-wrap {
  height: 8px;
  background: var(--bg2);
  border-radius: 4px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 4px;
  transition: width 0.35s ease;
  width: 0%;
}
.progress-info {
  display: flex;
  justify-content: space-between;
  font-size: 0.82rem;
  color: var(--muted);
}
.progress-pct { color: var(--accent); font-weight: 600; }

/* 扫描日志区域 */
.scan-log-area {
  width: 100%;
  max-width: 600px;
  background: var(--bg2);
  border: 1px solid var(--rule);
  border-radius: 10px;
  max-height: 260px;
  overflow-y: auto;
  padding: 0.75rem 1rem;
}
.scan-log-item {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.3rem 0;
  font-size: 0.8rem;
  border-bottom: 1px solid color-mix(in srgb, var(--rule) 40%, transparent);
  animation: fadeInUp 0.2s ease;
}
.scan-log-item:last-child { border-bottom: none; }
.scan-log-icon { font-size: 0.75rem; width: 16px; text-align: center; flex-shrink: 0; }
.scan-log-path {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--muted);
  font-family: 'SF Mono', 'Consolas', monospace;
  font-size: 0.75rem;
}
.scan-log-status { font-size: 0.72rem; flex-shrink: 0; }
.scan-log-item.found .scan-log-status { color: var(--accent); font-weight: 500; }
.scan-log-item.skip .scan-log-status { color: var(--muted); }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 统计数据 */
.scan-stats {
  display: flex;
  gap: 2rem;
  margin-top: 0.25rem;
}
.scan-stat {
  text-align: center;
}
.scan-stat-num {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--ink);
}
.scan-stat-label {
  font-size: 0.75rem;
  color: var(--muted);
  margin-top: 0.2rem;
}

/* 扫描完成结果区域 */
.cleaner-results {
  padding: 1.25rem 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.result-summary {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.25rem;
  background: var(--bg2);
  border: 1px solid var(--rule);
  border-radius: 12px;
}
.result-summary-left {
  display: flex;
  align-items: center;
  gap: 0.8rem;
}
.result-summary-icon { font-size: 1.8rem; }
.result-summary-title {
  font-size: 1rem;
  font-weight: 600;
  color: var(--ink);
}
.result-summary-size {
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--accent);
}
.result-summary-count {
  font-size: 0.8rem;
  color: var(--muted);
  margin-top: 0.15rem;
}

.category-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 0.75rem;
}
.category-card {
  background: var(--bg2);
  border: 1px solid var(--rule);
  border-radius: 11px;
  padding: 0.9rem;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.category-card:hover { border-color: var(--accent); }
.category-card.selected { border-color: var(--accent); background: rgba(59,130,246,0.07); }
.category-card.selected::after {
  content: '✓';
  position: absolute;
  top: 0.5rem;
  right: 0.5rem;
  width: 18px;
  height: 18px;
  background: var(--accent);
  color: #fff;
  border-radius: 50%;
  font-size: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.category-icon { font-size: 1.3rem; margin-bottom: 0.3rem; }
.category-name { font-size: 0.82rem; color: var(--ink); font-weight: 500; margin-bottom: 0.15rem; }
.category-size { font-size: 0.9rem; font-weight: 600; color: var(--accent); }

.group-card {
  background: var(--bg2);
  border: 1px solid var(--rule);
  border-radius: 11px;
  overflow: hidden;
}
.group-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.75rem 1rem;
  border-bottom: 1px solid var(--rule);
  cursor: pointer;
}
.group-title { font-size: 0.9rem; font-weight: 600; color: var(--ink); }
.group-meta { font-size: 0.78rem; color: var(--muted); }
.group-body {
  max-height: 280px;
  overflow-y: auto;
  display: none;
}
.group-card.expanded .group-body { display: block; }
.group-chevron { transition: transform 0.2s; font-size: 0.8rem; color: var(--muted); }
.group-card.expanded .group-chevron { transform: rotate(90deg); }

.item-row {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.5rem 1rem;
  border-bottom: 1px solid color-mix(in srgb, var(--rule) 40%, transparent);
  font-size: 0.8rem;
  cursor: pointer;
  transition: background 0.15s;
}
.item-row:last-child { border-bottom: none; }
.item-row:hover { background: var(--surface); }
.item-row.selected { background: rgba(59,130,246,0.07); }
.item-icon { font-size: 0.85rem; width: 20px; text-align: center; flex-shrink: 0; }
.item-info { flex: 1; min-width: 0; }
.item-name { color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-path { color: var(--muted); font-size: 0.7rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-size { color: var(--muted); font-size: 0.75rem; flex-shrink: 0; }
.item-check {
  width: 16px; height: 16px;
  border: 2px solid var(--rule);
  border-radius: 4px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  color: transparent;
}
.item-row.selected .item-check { background: var(--accent); border-color: var(--accent); color: #fff; }

.bottom-bar {
  position: sticky;
  bottom: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.75rem 1.25rem;
  background: var(--bg2);
  border: 1px solid var(--rule);
  border-radius: 11px;
  margin-top: 0.5rem;
}
.bottom-info { font-size: 0.85rem; }
.bottom-count { color: var(--accent); font-weight: 600; }
.bottom-size { color: var(--accent2); font-weight: 600; }
.bottom-actions { display: flex; gap: 0.5rem; }

.btn {
  padding: 0.5rem 1.1rem;
  font-size: 0.82rem;
  border-radius: 8px;
  cursor: pointer;
  border: none;
  font-weight: 500;
  transition: all 0.15s;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
}
.btn-primary:hover { opacity: 0.9; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary {
  background: var(--bg);
  color: var(--ink);
  border: 1px solid var(--rule);
}
.btn-secondary:hover { border-color: var(--accent); }

.toast {
  position: fixed;
  bottom: 2rem; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 0.75rem 1.4rem;
  font-size: 0.85rem;
  z-index: 2000;
  transition: transform 0.3s ease;
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { border-color: #10b981; color: #10b981; }
.toast.error { border-color: #ef4444; color: #ef4444; }
</style>
</head>
<body>
<script src="utils.js"></script>
<script>
(function() {
  const content = Disken.initPage('cleaner', '🧹 垃圾清理');

  let junkData = null;
  let selectedCategories = new Set();
  let selectedItems = new Set();
  let isScanning = false;

  const iconMap = {
    temp: '🗑️', recycle: '♻️', download: '📥', cache: '💾',
    thumbnail: '🖼️', npm: '📦', windows: '⚙️'
  };

  function showToast(msg, type) {
    let toast = document.getElementById('toast');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'toast';
      toast.className = 'toast';
      document.body.appendChild(toast);
    }
    toast.textContent = msg;
    toast.className = 'toast ' + type;
    requestAnimationFrame(() => toast.classList.add('show'));
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  function renderInitial() {
    content.innerHTML = `
      <div class="cleaner-page">
        <div class="cleaner-center">
          <div class="center-ring-static"></div>
          <div class="center-title">点击下方按钮开始扫描垃圾文件</div>
          <button class="start-btn" onclick="startScan()">
            🚀 开始扫描
          </button>
        </div>
      </div>`;
  }

  function renderScanning(progressData) {
    const totalDirs = progressData.totalDirs || 1;
    const dirIndex = progressData.dirIndex || 0;
    const pct = Math.min(Math.round((dirIndex / totalDirs) * 100), 100);
    const foundCount = progressData.foundCount || 0;

    content.innerHTML = `
      <div class="cleaner-page">
        <div class="cleaner-center">
          <div class="center-ring"></div>
          <div class="center-title">正在扫描垃圾文件...</div>

          <div class="progress-area">
            <div class="progress-bar-wrap">
              <div class="progress-bar-fill" id="progFill" style="width:${pct}%"></div>
            </div>
            <div class="progress-info">
              <span id="progCurrent">${progressData.currentDir || '准备中...'}</span>
              <span class="progress-pct" id="progPct">${pct}%</span>
            </div>
          </div>

          <div class="scan-stats">
            <div class="scan-stat">
              <div class="scan-stat-num" id="statFound">${foundCount}</div>
              <div class="scan-stat-label">已发现垃圾文件</div>
            </div>
          </div>

          <div class="scan-log-area" id="scanLog">
          </div>

          <button class="start-btn" disabled>扫描中...</button>
        </div>
      </div>`;
  }

  function updateScanning(progressData) {
    const totalDirs = progressData.totalDirs || 1;
    const dirIndex = progressData.dirIndex || 0;
    const pct = Math.min(Math.round((dirIndex / totalDirs) * 100), 100);

    const fill = document.getElementById('progFill');
    const pctEl = document.getElementById('progPct');
    const curEl = document.getElementById('progCurrent');
    const foundEl = document.getElementById('statFound');

    if (fill) fill.style.width = pct + '%';
    if (pctEl) pctEl.textContent = pct + '%';
    if (curEl && progressData.currentDir) curEl.textContent = progressData.currentDir;
    if (foundEl) foundEl.textContent = progressData.foundCount || 0;
  }

  function appendLog(progressData) {
    const log = document.getElementById('scanLog');
    if (!log) return;

    let icon, status, cls;
    if (progressData.phase === 'scanning') {
      icon = '🔍';
      status = '扫描中...';
      cls = '';
    } else if (progressData.phase === 'scanned') {
      icon = '✅';
      const n = progressData.dirItems || 0;
      status = n > 0 ? `发现 ${n} 个垃圾` : '无垃圾';
      cls = n > 0 ? 'found' : '';
    } else if (progressData.phase === 'skip') {
      icon = '⏭️';
      status = '已跳过';
      cls = 'skip';
    } else if (progressData.phase === 'error') {
      icon = '❌';
      status = progressData.error || '错误';
      cls = '';
    } else if (progressData.phase === 'analyzing') {
      icon = '📊';
      status = '统计分析中...';
      cls = '';
    } else {
      return;
    }

    const item = document.createElement('div');
    item.className = 'scan-log-item ' + cls;
    item.innerHTML = `<span class="scan-log-icon">${icon}</span><span class="scan-log-path">${progressData.currentDir || ''}</span><span class="scan-log-status">${status}</span>`;
    log.appendChild(item);
    log.scrollTop = log.scrollHeight;
  }

  function renderResults(data) {
    const totalSize = Disken.formatSize(data.totalSize);

    const categoryHtml = data.categoryStats.map(cat => {
      const isSelected = selectedCategories.has(cat.category);
      return `<div class="category-card${isSelected ? ' selected' : ''}" data-category="${cat.category}">
        <div class="category-icon">${iconMap[cat.category] || '📁'}</div>
        <div class="category-name">${cat.label}</div>
        <div class="category-size">${cat.sizeFormatted}</div>
      </div>`;
    }).join('');

    let groupsHtml = '';
    for (let gi = 0; gi < data.groups.length; gi++) {
      const group = data.groups[gi];
      const itemsHtml = group.items.map(item => {
        const isSelected = selectedItems.has(item.path);
        return `<div class="item-row${isSelected ? ' selected' : ''}" data-path="${item.path}">
          <div class="item-check">✓</div>
          <div class="item-icon">${item.type === 'directory' ? '📁' : '📄'}</div>
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-path">${item.path}</div>
          </div>
          <div class="item-size">${Disken.formatSize(item.size)}</div>
        </div>`;
      }).join('');

      groupsHtml += `<div class="group-card${gi === 0 ? ' expanded' : ''}" data-group="${gi}">
        <div class="group-header" onclick="toggleGroup(${gi})">
          <div style="display:flex;align-items:center;gap:0.5rem">
            <span class="group-chevron">▶</span>
            <span class="group-title">${group.label}</span>
          </div>
          <span class="group-meta">${group.itemCount} 个 · ${Disken.formatSize(group.totalSize)}</span>
        </div>
        <div class="group-body">${itemsHtml}</div>
      </div>`;
    }

    content.innerHTML = `
      <div class="cleaner-page">
        <div class="cleaner-results">
          <div class="result-summary">
            <div class="result-summary-left">
              <div class="result-summary-icon">🧹</div>
              <div>
                <div class="result-summary-title">扫描完成</div>
                <div class="result-summary-count">共发现 ${data.totalCount} 个垃圾文件</div>
              </div>
            </div>
            <div style="text-align:right">
              <div class="result-summary-size">${totalSize}</div>
              <div style="font-size:0.75rem;color:var(--muted);margin-top:0.2rem">可清理空间</div>
            </div>
          </div>

          <div class="category-grid">${categoryHtml}</div>

          ${groupsHtml}

          <div class="bottom-bar">
            <div class="bottom-info">
              已选择 <span class="bottom-count" id="selCount">0</span> 个文件，共 <span class="bottom-size" id="selSize">0 B</span>
            </div>
            <div class="bottom-actions">
              <button class="btn btn-secondary" onclick="selectAll()">全选</button>
              <button class="btn btn-secondary" onclick="deselectAll()">取消全选</button>
              <button class="btn btn-primary" onclick="cleanSelected()" id="btnClean" disabled>一键清理</button>
            </div>
          </div>
        </div>
      </div>`;

    bindResultEvents();
    updateSummary();
  }

  function bindResultEvents() {
    document.querySelectorAll('.category-card').forEach(card => {
      card.addEventListener('click', () => toggleCategory(card.dataset.category));
    });
    document.querySelectorAll('.item-row').forEach(row => {
      row.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleItem(row.dataset.path);
      });
    });
  }

  function toggleGroup(index) {
    const card = document.querySelector(`.group-card[data-group="${index}"]`);
    if (card) card.classList.toggle('expanded');
  }

  function toggleCategory(category) {
    if (selectedCategories.has(category)) {
      selectedCategories.delete(category);
    } else {
      selectedCategories.add(category);
    }
    for (const group of junkData.groups) {
      for (const item of group.items) {
        if (item.category === category) {
          if (selectedCategories.has(category)) {
            selectedItems.add(item.path);
          } else {
            selectedItems.delete(item.path);
          }
        }
      }
    }
    renderResults(junkData);
  }

  function toggleItem(path) {
    if (selectedItems.has(path)) {
      selectedItems.delete(path);
    } else {
      selectedItems.add(path);
    }
    updateSummary();
    const row = document.querySelector(`.item-row[data-path="${path}"]`);
    if (row) row.classList.toggle('selected');
  }

  function selectAll() {
    selectedItems.clear();
    for (const group of junkData.groups) {
      for (const item of group.items) {
        selectedItems.add(item.path);
      }
    }
    renderResults(junkData);
  }

  function deselectAll() {
    selectedItems.clear();
    selectedCategories.clear();
    renderResults(junkData);
  }

  function updateSummary() {
    if (!junkData) return;
    const count = selectedItems.size;
    let size = 0;
    for (const group of junkData.groups) {
      for (const item of group.items) {
        if (selectedItems.has(item.path)) size += item.size;
      }
    }
    const c = document.getElementById('selCount');
    const s = document.getElementById('selSize');
    const b = document.getElementById('btnClean');
    if (c) c.textContent = count;
    if (s) s.textContent = Disken.formatSize(size);
    if (b) b.disabled = count === 0;
  }

  async function startScan() {
    if (isScanning) return;
    isScanning = true;
    selectedCategories.clear();
    selectedItems.clear();
    junkData = null;

    renderScanning({ phase: 'init', dirIndex: 0, totalDirs: 1, foundCount: 0, currentDir: '准备扫描...' });

    try {
      const res = await fetch('/api/junk-scan-stream');
      if (!res.ok) throw new Error('HTTP ' + res.status);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try {
              const event = JSON.parse(line.slice(6));
              if (event.phase === 'done') {
                junkData = event;
                renderResults(junkData);
              } else if (event.phase === 'scanning') {
                updateScanning(event);
              } else if (event.phase === 'scanned' || event.phase === 'skip' || event.phase === 'error' || event.phase === 'analyzing') {
                appendLog(event);
                updateScanning(event);
              }
            } catch(e) {
              console.error('Parse error:', e);
            }
          }
        }
      }
    } catch(e) {
      console.error('Scan error:', e);
      showToast('扫描失败: ' + e.message, 'error');
      renderInitial();
    } finally {
      isScanning = false;
    }
  }

  async function cleanSelected() {
    const paths = Array.from(selectedItems);
    if (paths.length === 0) return;

    Disken.showConfirm(`确定要清理选中的 ${paths.length} 个文件吗？此操作不可恢复。`, async () => {
      try {
        const res = await fetch('/api/junk-delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ paths })
        });
        const data = await res.json();
        if (data.success) {
          showToast(`清理完成：成功 ${data.success} 个，失败 ${data.failed} 个`, 'success');
          startScan();
        } else {
          showToast('清理失败: ' + (data.error || '未知错误'), 'error');
        }
      } catch(e) {
        showToast('清理失败: ' + e.message, 'error');
      }
    });
  }

  window.startScan = startScan;
  window.cleanSelected = cleanSelected;
  window.selectAll = selectAll;
  window.deselectAll = deselectAll;
  window.toggleGroup = toggleGroup;

  renderInitial();
})();
</script>
</body>
</html>
