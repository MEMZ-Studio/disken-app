<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>垃圾清理 - 磁盘精灵</title>
<link rel="stylesheet" href="styles.css">
<style>
.cleaner-wrapper {
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
}

.scan-hero {
  text-align: center;
  padding: 2rem 1.5rem;
  background: var(--bg2);
  border: 1px solid var(--rule);
  border-radius: 14px;
}
.scan-hero-icon {
  font-size: 3rem;
  margin-bottom: 0.75rem;
}
.scan-hero-title {
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 0.35rem;
}
.scan-hero-desc {
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 1.25rem;
}
.scan-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.75rem 2.5rem;
  font-size: 1rem;
  font-weight: 600;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  transition: all 0.2s;
}
.scan-btn:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 4px 18px rgba(59,130,246,0.35); }
.scan-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

.progress-section {
  background: var(--bg2);
  border: 1px solid var(--rule);
  border-radius: 14px;
  padding: 1.5rem;
}
.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.75rem;
}
.progress-label {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--ink);
}
.progress-pct {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--accent);
}
.progress-bar {
  height: 8px;
  background: var(--bg);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 1rem;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 4px;
  transition: width 0.35s ease;
  width: 0%;
}
.progress-stats {
  display: flex;
  gap: 2rem;
  flex-wrap: wrap;
}
.progress-stat {
  display: flex;
  flex-direction: column;
  gap: 0.15rem;
}
.progress-stat-value {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--ink);
}
.progress-stat-label {
  font-size: 0.75rem;
  color: var(--muted);
}

.scan-log {
  background: var(--bg2);
  border: 1px solid var(--rule);
  border-radius: 14px;
  padding: 1rem 1.25rem;
  max-height: 220px;
  overflow-y: auto;
}
.scan-log-title {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.scan-log-item {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.3rem 0;
  font-size: 0.8rem;
  color: var(--ink);
  border-bottom: 1px solid color-mix(in srgb, var(--rule) 30%, transparent);
  animation: fadeIn 0.2s ease;
}
.scan-log-item:last-child { border-bottom: none; }
.scan-log-icon { font-size: 0.75rem; width: 16px; text-align: center; flex-shrink: 0; }
.scan-log-path { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); font-family: 'SF Mono', 'Consolas', monospace; font-size: 0.73rem; }
.scan-log-status { font-size: 0.73rem; color: var(--accent2); flex-shrink: 0; }
.scan-log-item.found .scan-log-status { color: var(--accent); }

@keyframes fadeIn { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: translateX(0); } }

.category-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 0.75rem;
}
.category-card {
  background: var(--bg2);
  border: 1px solid var(--rule);
  border-radius: 11px;
  padding: 1rem;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.category-card:hover { border-color: var(--accent); }
.category-card.selected { border-color: var(--accent); background: rgba(59,130,246,0.07); }
.category-card.selected::after {
  content: '✓';
  position: absolute;
  top: 0.5rem;
  right: 0.5rem;
  width: 18px;
  height: 18px;
  background: var(--accent);
  color: #fff;
  border-radius: 50%;
  font-size: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.category-icon { font-size: 1.4rem; margin-bottom: 0.35rem; }
.category-name { font-size: 0.85rem; color: var(--ink); font-weight: 500; margin-bottom: 0.2rem; }
.category-size { font-size: 0.95rem; font-weight: 600; color: var(--accent); }

.scan-card {
  background: var(--bg2);
  border: 1px solid var(--rule);
  border-radius: 12px;
  padding: 1.25rem;
}
.scan-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.75rem;
}
.scan-card-title { font-size: 0.95rem; font-weight: 600; color: var(--ink); }
.scan-card-count { font-size: 0.8rem; color: var(--muted); }
.scan-card-progress { height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden; margin-bottom: 0.6rem; }
.scan-card-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); width: 100%; }
.scan-card-stats { display: flex; gap: 1.5rem; font-size: 0.82rem; }
.scan-card-stat-value { font-weight: 600; color: var(--ink); }
.scan-card-stat-label { color: var(--muted); font-size: 0.73rem; }

.item-list { max-height: 320px; overflow-y: auto; }
.item-row {
  display: flex;
  align-items: center;
  gap: 0.65rem;
  padding: 0.5rem 0.65rem;
  border-bottom: 1px solid color-mix(in srgb, var(--rule) 50%, transparent);
  font-size: 0.82rem;
  cursor: pointer;
  transition: background 0.15s;
}
.item-row:hover { background: var(--surface); }
.item-row.selected { background: rgba(59,130,246,0.07); }
.item-icon { font-size: 0.9rem; width: 20px; text-align: center; flex-shrink: 0; }
.item-info { flex: 1; min-width: 0; }
.item-name { color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-path { color: var(--muted); font-size: 0.72rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-size { color: var(--muted); font-size: 0.78rem; flex-shrink: 0; }
.item-check {
  width: 18px; height: 18px;
  border: 2px solid var(--rule);
  border-radius: 4px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: transparent;
  transition: all 0.15s;
}
.item-row.selected .item-check { background: var(--accent); border-color: var(--accent); color: #fff; }

.summary-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.85rem 1.1rem;
  background: var(--bg2);
  border: 1px solid var(--rule);
  border-radius: 11px;
}
.summary-info { font-size: 0.85rem; color: var(--ink); }
.summary-count { color: var(--accent); font-weight: 600; }
.summary-size { color: var(--accent2); font-weight: 600; }
.summary-actions { display: flex; gap: 0.5rem; }

.btn {
  padding: 0.55rem 1.2rem;
  font-size: 0.85rem;
  border-radius: 9px;
  cursor: pointer;
  border: none;
  font-weight: 500;
  transition: all 0.15s;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
}
.btn-primary:hover { opacity: 0.9; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary {
  background: var(--bg);
  color: var(--ink);
  border: 1px solid var(--rule);
}
.btn-secondary:hover { border-color: var(--accent); }

.toast {
  position: fixed;
  bottom: 2rem; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: 11px;
  padding: 0.8rem 1.5rem;
  font-size: 0.9rem;
  z-index: 2000;
  transition: transform 0.3s ease;
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { border-color: #10b981; color: #10b981; }
.toast.error { border-color: #ef4444; color: #ef4444; }
</style>
</head>
<body>
<script src="utils.js"></script>
<script>
(function() {
  const content = Disken.initPage('cleaner', '🧹 垃圾清理');

  let junkData = null;
  let selectedCategories = new Set();
  let selectedItems = new Set();
  let isScanning = false;

  const iconMap = {
    temp: '🗑️', recycle: '♻️', download: '📥', cache: '💾',
    thumbnail: '🖼️', npm: '📦', windows: '⚙️'
  };

  function renderInitial() {
    content.innerHTML = `
      <div class="cleaner-wrapper">
        <div class="scan-hero">
          <div class="scan-hero-icon">🧹</div>
          <div class="scan-hero-title">垃圾文件清理</div>
          <div class="scan-hero-desc">扫描并清理系统中的临时文件、缓存文件等无用数据</div>
          <button class="scan-btn" id="btnStartScan" onclick="startScan()">🚀 开始扫描</button>
        </div>
      </div>
      <div class="toast" id="toast"></div>`;
  }

  function renderScanning(progressData) {
    const pct = progressData.totalDirs > 0 ? Math.round((progressData.dirIndex / progressData.totalDirs) * 100) : 0;

    let logItems = '';
    const logContainer = document.getElementById('scanLog');
    if (logContainer) {
      logItems = logContainer.innerHTML;
    }

    content.innerHTML = `
      <div class="cleaner-wrapper">
        <div class="scan-hero" style="padding:1.25rem">
          <div class="scan-hero-icon" style="font-size:2rem">🔍</div>
          <div class="scan-hero-title">正在扫描垃圾文件...</div>
          <button class="scan-btn" disabled>扫描中...</button>
        </div>

        <div class="progress-section">
          <div class="progress-header">
            <span class="progress-label">扫描进度</span>
            <span class="progress-pct">${pct}%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${pct}%"></div>
          </div>
          <div class="progress-stats">
            <div class="progress-stat">
              <span class="progress-stat-value" id="statFound">${progressData.foundCount || 0}</span>
              <span class="progress-stat-label">已发现垃圾文件</span>
            </div>
            <div class="progress-stat">
              <span class="progress-stat-value" id="statCurrent">${progressData.currentDir || '—'}</span>
              <span class="progress-stat-label">当前扫描目录</span>
            </div>
          </div>
        </div>

        <div class="scan-log" id="scanLog">
          <div class="scan-log-title">扫描日志</div>
          ${logItems}
        </div>
      </div>
      <div class="toast" id="toast"></div>`;
  }

  function appendScanLog(progressData) {
    const log = document.getElementById('scanLog');
    if (!log) return;

    let icon, status, cls;
    if (progressData.phase === 'scanning') {
      icon = '🔍';
      status = '扫描中...';
      cls = '';
    } else if (progressData.phase === 'scanned') {
      icon = '✅';
      status = (progressData.dirItems || 0) > 0 ? `发现 ${progressData.dirItems} 个` : '无垃圾';
      cls = (progressData.dirItems || 0) > 0 ? 'found' : '';
    } else if (progressData.phase === 'skip') {
      icon = '⏭️';
      status = '已跳过';
      cls = '';
    } else if (progressData.phase === 'error') {
      icon = '❌';
      status = progressData.error || '错误';
      cls = '';
    } else {
      return;
    }

    const item = document.createElement('div');
    item.className = 'scan-log-item ' + cls;
    item.innerHTML = `<span class="scan-log-icon">${icon}</span><span class="scan-log-path">${progressData.currentDir || ''}</span><span class="scan-log-status">${status}</span>`;
    log.appendChild(item);
    log.scrollTop = log.scrollHeight;
  }

  function renderResults(data) {
    const totalSize = Disken.formatSize(data.totalSize);

    const categoryHtml = data.categoryStats.map(cat => {
      const isSelected = selectedCategories.has(cat.category);
      return `<div class="category-card${isSelected ? ' selected' : ''}" data-category="${cat.category}">
        <div class="category-icon">${iconMap[cat.category] || '📁'}</div>
        <div class="category-name">${cat.label}</div>
        <div class="category-size">${cat.sizeFormatted}</div>
      </div>`;
    }).join('');

    let groupsHtml = '';
    for (const group of data.groups) {
      const itemsHtml = group.items.map(item => {
        const isSelected = selectedItems.has(item.path);
        return `<div class="item-row${isSelected ? ' selected' : ''}" data-path="${item.path}">
          <div class="item-icon">${item.type === 'directory' ? '📁' : '📄'}</div>
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-path">${item.path}</div>
          </div>
          <div class="item-size">${Disken.formatSize(item.size)}</div>
          <div class="item-check">✓</div>
        </div>`;
      }).join('');

      groupsHtml += `<div class="scan-card">
        <div class="scan-card-header">
          <span class="scan-card-title">${group.label}</span>
          <span class="scan-card-count">${group.itemCount} 个文件</span>
        </div>
        <div class="scan-card-progress"><div class="scan-card-bar"></div></div>
        <div class="scan-card-stats">
          <div>
            <span class="scan-card-stat-value">${Disken.formatSize(group.totalSize)}</span>
            <span class="scan-card-stat-label" style="margin-left:0.3rem">总大小</span>
          </div>
        </div>
        <div class="item-list">${itemsHtml}</div>
      </div>`;
    }

    content.innerHTML = `
      <div class="cleaner-wrapper">
        <div class="scan-hero" style="padding:1rem">
          <div style="display:flex;align-items:center;gap:0.6rem;justify-content:center">
            <span style="font-size:1.5rem">🧹</span>
            <span style="font-size:1rem;font-weight:600;color:var(--ink)">扫描完成</span>
            <span style="color:var(--accent);font-weight:600">${totalSize}</span>
          </div>
          <button class="scan-btn" style="margin-top:0.75rem" onclick="startScan()">🔄 重新扫描</button>
        </div>

        <div class="category-grid">${categoryHtml}</div>
        ${groupsHtml}

        <div class="summary-bar">
          <div class="summary-info">
            已选择 <span class="summary-count" id="selectedCount">0</span> 个文件，共 <span class="summary-size" id="selectedSize">0 B</span>
          </div>
          <div class="summary-actions">
            <button class="btn btn-secondary" onclick="selectAll()">全选</button>
            <button class="btn btn-secondary" onclick="deselectAll()">取消全选</button>
            <button class="btn btn-primary" onclick="cleanSelected()" id="btnClean" disabled>清理选中</button>
          </div>
        </div>
      </div>
      <div class="toast" id="toast"></div>`;

    bindResultsEvents();
    updateSummary();
  }

  function bindResultsEvents() {
    document.querySelectorAll('.category-card').forEach(card => {
      card.addEventListener('click', () => toggleCategory(card.dataset.category));
    });
    document.querySelectorAll('.item-row').forEach(row => {
      row.addEventListener('click', () => toggleItem(row.dataset.path));
    });
  }

  function toggleCategory(category) {
    if (selectedCategories.has(category)) {
      selectedCategories.delete(category);
    } else {
      selectedCategories.add(category);
    }
    for (const group of junkData.groups) {
      for (const item of group.items) {
        if (item.category === category) {
          if (selectedCategories.has(category)) {
            selectedItems.add(item.path);
          } else {
            selectedItems.delete(item.path);
          }
        }
      }
    }
    renderResults(junkData);
  }

  function toggleItem(path) {
    if (selectedItems.has(path)) {
      selectedItems.delete(path);
    } else {
      selectedItems.add(path);
    }
    updateSummary();
    const row = document.querySelector(`.item-row[data-path="${path}"]`);
    if (row) row.classList.toggle('selected');
  }

  function selectAll() {
    selectedItems.clear();
    for (const group of junkData.groups) {
      for (const item of group.items) {
        selectedItems.add(item.path);
      }
    }
    renderResults(junkData);
  }

  function deselectAll() {
    selectedItems.clear();
    selectedCategories.clear();
    renderResults(junkData);
  }

  function updateSummary() {
    if (!junkData) return;
    const count = selectedItems.size;
    let size = 0;
    for (const group of junkData.groups) {
      for (const item of group.items) {
        if (selectedItems.has(item.path)) size += item.size;
      }
    }
    const countEl = document.getElementById('selectedCount');
    const sizeEl = document.getElementById('selectedSize');
    const btnEl = document.getElementById('btnClean');
    if (countEl) countEl.textContent = count;
    if (sizeEl) sizeEl.textContent = Disken.formatSize(size);
    if (btnEl) btnEl.disabled = count === 0;
  }

  function showToast(msg, type) {
    const toast = document.getElementById('toast');
    if (!toast) return;
    toast.textContent = msg;
    toast.className = 'toast ' + type;
    requestAnimationFrame(() => toast.classList.add('show'));
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  async function startScan() {
    if (isScanning) return;
    isScanning = true;
    selectedCategories.clear();
    selectedItems.clear();
    junkData = null;

    renderScanning({ phase: 'init', dirIndex: 0, totalDirs: 1, foundCount: 0, currentDir: '准备扫描...' });

    try {
      const res = await fetch('/api/junk-scan-stream');
      if (!res.ok) throw new Error('HTTP ' + res.status);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try {
              const event = JSON.parse(line.slice(6));
              if (event.phase === 'done') {
                junkData = event;
                renderResults(junkData);
              } else if (event.phase === 'scanning') {
                renderScanning(event);
              } else if (event.phase === 'scanned' || event.phase === 'skip' || event.phase === 'error') {
                appendScanLog(event);
                renderScanning(event);
              }
            } catch(e) {
              console.error('Parse error:', e, line);
            }
          }
        }
      }
    } catch(e) {
      console.error('Scan error:', e);
      showToast('扫描失败: ' + e.message, 'error');
      renderInitial();
    } finally {
      isScanning = false;
    }
  }

  async function cleanSelected() {
    const paths = Array.from(selectedItems);
    if (paths.length === 0) return;

    Disken.showConfirm(`确定要清理选中的 ${paths.length} 个文件吗？此操作不可恢复。`, async () => {
      try {
        const res = await fetch('/api/junk-delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ paths })
        });
        const data = await res.json();
        if (data.success) {
          showToast(`清理完成：成功 ${data.success} 个，失败 ${data.failed} 个`, 'success');
          startScan();
        } else {
          showToast('清理失败: ' + (data.error || '未知错误'), 'error');
        }
      } catch(e) {
        showToast('清理失败: ' + e.message, 'error');
      }
    });
  }

  window.startScan = startScan;
  window.cleanSelected = cleanSelected;
  window.selectAll = selectAll;
  window.deselectAll = deselectAll;

  renderInitial();
})();
</script>
</body>
</html>
