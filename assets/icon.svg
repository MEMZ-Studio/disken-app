<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="224" height="224" rx="48" ry="48" fill="url(#bgGrad)" />
  <!-- Subtle inner shadow -->
  <rect x="16" y="16" width="224" height="224" rx="48" ry="48" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
  <!-- Dk text -->
  <text x="128" y="152" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="100" font-weight="700" fill="#ffffff" letter-spacing="-2">Dk</text>
